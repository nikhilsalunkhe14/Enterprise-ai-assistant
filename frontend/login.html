<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Engineering Agent - Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="login-header">
                <h1>AI Prompt Engineering Agent</h1>
                <p>IT Project Delivery Guidance System</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" required placeholder="Enter your full name">
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email address">
                </div>
                
                <button type="submit" class="btn-primary">Start Session</button>
            </form>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            
            // Generate session_id using email + timestamp
            const sessionId = email + '_' + Date.now();
            
            // Store session data in localStorage
            localStorage.setItem('session_id', sessionId);
            localStorage.setItem('user_name', fullName);
            localStorage.setItem('user_email', email);
            
            // Redirect to corporate dashboard
            window.location.href = 'corporate-dashboard.html';
        });
    </script>
</body>
</html>
