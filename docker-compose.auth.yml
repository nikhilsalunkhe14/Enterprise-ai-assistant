version: '3.8'

services:
  backend:
    build: ./backend
    dockerfile: Dockerfile.auth
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=your-secret-key-change-in-production
    volumes:
      - ./backend/app.db:/app/app.db
    
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://backend:8000
